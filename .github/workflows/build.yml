name: Build and Push Image

on:
  workflow_dispatch:
    inputs:
      base_tag:
        description: 'Base image tag (e.g. v1.17.0 or latest)'
        required: false
        default: 'latest'
        type: string
  workflow_call:
    inputs:
      base_tag:
        required: false
        default: 'latest'
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine base tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE_TAG="${{ github.ref_name }}"
          else
            BASE_TAG="${{ inputs.base_tag }}"
          fi
          BASE_TAG="${BASE_TAG:-latest}"
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"

          OWNER="${{ github.repository_owner }}"
          IMAGE="ghcr.io/${OWNER}/docling-serve-jp"

          if [ "${BASE_TAG}" = "latest" ]; then
            TAGS="${IMAGE}:latest"
          else
            TAGS="${IMAGE}:${BASE_TAG},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_TAG=${{ steps.vars.outputs.base_tag }}
          tags: ${{ steps.vars.outputs.tags }}

      - name: Summary
        run: |
          echo "### Build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **base_tag**: ${{ steps.vars.outputs.base_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **tags**: ${{ steps.vars.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **digest**: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

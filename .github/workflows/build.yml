name: Build and Push Image

on:
  workflow_dispatch:
    inputs:
      base_tag:
        description: 'Base image tag (e.g. v1.17.0 or latest)'
        required: false
        default: 'latest'
        type: string
  workflow_call:
    inputs:
      base_tag:
        required: false
        default: 'latest'
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Determine base tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE_TAG="${{ github.ref_name }}"
          else
            BASE_TAG="${{ inputs.base_tag }}"
          fi
          BASE_TAG="${BASE_TAG:-latest}"
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"

          OWNER="${{ github.repository_owner }}"
          IMAGE="ghcr.io/${OWNER}/docling-serve-jp"

          if [ "${BASE_TAG}" = "latest" ]; then
            TAGS="${IMAGE}:latest"
          else
            TAGS="${IMAGE}:${BASE_TAG},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Check if image tag already exists
        id: ghcr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ steps.vars.outputs.base_tag }}"

          if [ "${TAG}" = "latest" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "latest is mutable. Build will proceed."
            exit 0
          fi

          BASE64_TOKEN=$(printf '%s:%s' "${{ github.actor }}" "${GH_TOKEN}" | base64 | tr -d '\n')
          AUTH_TOKEN=$(curl -fsSL \
            -H "Authorization: Basic ${BASE64_TOKEN}" \
            "https://ghcr.io/token?scope=repository:${OWNER}/docling-serve-jp:pull&service=ghcr.io" \
            | jq -r '.token')

          HTTP_STATUS=$(curl -sS -o /tmp/ghcr-tags.json -w "%{http_code}" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            "https://ghcr.io/v2/${OWNER}/docling-serve-jp/tags/list")

          echo "GHCR tag list check for ${TAG}: HTTP ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" = "404" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Package does not exist yet. Build will proceed."
            exit 0
          fi

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "Failed to query GHCR tags: HTTP ${HTTP_STATUS}" >&2
            cat /tmp/ghcr-tags.json >&2 || true
            exit 1
          fi

          if jq -e --arg tag "${TAG}" '(.tags // []) | index($tag) != null' /tmp/ghcr-tags.json > /dev/null; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is already published. Skipping build."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is not published yet. Build will proceed."
          fi

      - name: Checkout
        if: steps.ghcr.outputs.needs_build == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.ghcr.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.ghcr.outputs.needs_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        if: steps.ghcr.outputs.needs_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_TAG=${{ steps.vars.outputs.base_tag }}
          tags: ${{ steps.vars.outputs.tags }}

      - name: Summary
        run: |
          if [ "${{ steps.ghcr.outputs.needs_build }}" = "true" ]; then
            echo "### Build complete" >> "$GITHUB_STEP_SUMMARY"
            echo "- **base_tag**: ${{ steps.vars.outputs.base_tag }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **tags**: ${{ steps.vars.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **digest**: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Build skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "- **base_tag**: ${{ steps.vars.outputs.base_tag }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **reason**: tag already exists in GHCR" >> "$GITHUB_STEP_SUMMARY"
          fi

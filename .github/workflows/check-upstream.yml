name: Check Upstream Tags

on:
  schedule:
    - cron: '0 2 * * *'  # 毎日 JST 11:00 (UTC 02:00)
  workflow_dispatch: {}

# workflow_call 経由で build.yml を呼ぶため packages: write が必要
permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      latest_tag: ${{ steps.upstream.outputs.latest_tag }}
      needs_build: ${{ steps.ghcr.outputs.needs_build }}

    steps:
      - name: Fetch latest upstream tag
        id: upstream
        run: |
          LATEST_TAG=$(curl -fsSL \
            "https://quay.io/api/v1/repository/docling-project/docling-serve/tag/?limit=10&page=1&onlyActiveTags=true" \
            | jq -r '[.tags[] | select(.name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(.name | ltrimstr("v") | split(".") | map(tonumber)) | last | .name')
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Upstream latest tag: ${LATEST_TAG}"

      - name: Check if tag already built in GHCR
        id: ghcr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ steps.upstream.outputs.latest_tag }}"

          BASE64_TOKEN=$(printf '%s:%s' "${{ github.actor }}" "${GH_TOKEN}" | base64 | tr -d '\n')
          AUTH_TOKEN=$(curl -fsSL \
            -H "Authorization: Basic ${BASE64_TOKEN}" \
            "https://ghcr.io/token?scope=repository:${OWNER}/docling-serve-jp:pull&service=ghcr.io" \
            | jq -r '.token')

          HTTP_STATUS=$(curl -sS -o /tmp/ghcr-tags.json -w "%{http_code}" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            "https://ghcr.io/v2/${OWNER}/docling-serve-jp/tags/list")

          echo "GHCR tag list check for ${TAG}: HTTP ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" = "404" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Package does not exist yet. Build will be triggered."
            exit 0
          fi

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "Failed to query GHCR tags: HTTP ${HTTP_STATUS}" >&2
            cat /tmp/ghcr-tags.json >&2 || true
            exit 1
          fi

          if jq -e --arg tag "${TAG}" '(.tags // []) | index($tag) != null' /tmp/ghcr-tags.json > /dev/null; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is already built. Skipping."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "New tag ${TAG} detected. Build will be triggered."
          fi

  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    with:
      base_tag: ${{ needs.check.outputs.latest_tag }}
